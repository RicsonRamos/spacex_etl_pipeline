version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.2
  env_file: .env
  environment:
    &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db_postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY}"
    AIRFLOW_UID: 0
    _PIP_ADDITIONAL_REQUIREMENTS: dbt-postgres==1.5.0
    DOCKER_API_VERSION: '1.44' 
    DOCKER_HOST: unix:///var/run/docker.sock
    # RIGOR: Injeção do caminho absoluto do host para o Airflow usar no DockerOperator
    DBT_PROJECT_PATH_ON_HOST: "${PWD}/dbt_spacex"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./dbt_spacex:/opt/airflow/dbt
    - /var/run/docker.sock:/var/run/docker.sock
  networks:
    - spacex_network

services:
  db_postgres:
    image: postgres:15
    container_name: spacex_postgres
    env_file: .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_postgres_data:/var/lib/postgresql/data
    networks:
      - spacex_network

  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    depends_on:
      db_postgres:
        condition: service_healthy
    command: >
      bash -c "airflow db init && 
      airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@admin.com --password admin"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    restart: always
    ports:
      - "8080:8080"
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    restart: always
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  ingestion_engine:
    build: .
    image: spacex_etl_pipeline-ingestion_engine
    container_name: spacex_ingestion
    env_file: .env
    networks:
      - spacex_network

networks:
  spacex_network:
    name: spacex_etl_pipeline_default

volumes:
  db_postgres_data: