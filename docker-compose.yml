services:
  # Banco de Dados (OLAP e Metadata)
  db_postgres:
    image: postgres:15
    container_name: spacex_postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_postgres_data:/var/lib/postgresql/data
    networks:
      - spacex_network

  # Inicializador do Airflow (Roda uma vez e sai)
  airflow-init:
    image: apache/airflow:2.7.1
    container_name: airflow_init
    depends_on:
      db_postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db_postgres:5432/${POSTGRES_DB}
    # Comando cria o banco e o usuário admin inicial
    command: >
      bash -c "airflow db init && 
      airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@admin.com --password admin"
    networks:
      - spacex_network

  # Airflow Webserver
  airflow-webserver:
    image: apache/airflow:2.7.1
    container_name: airflow_webserver
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db_postgres:5432/${POSTGRES_DB}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=iEeA-QCbdpC6OoPqHnFHSWLW-wHG_wv2sLTqQQHiCx0=
      - AIRFLOW_UID=0
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    networks:
      - spacex_network

  # Airflow Scheduler
  airflow-scheduler:
    image: apache/airflow:2.7.1
    container_name: airflow_scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db_postgres:5432/${POSTGRES_DB}
      - AIRFLOW__CORE__FERNET_KEY=iEeA-QCbdpC6OoPqHnFHSWLW-wHG_wv2sLTqQQHiCx0=
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock # ESSENCIAL PARA O DOCKEROPERATOR
    networks:
      - spacex_network

  # Ingestão Python (Executado via DAG ou Manual)
  ingestion_engine:
    build: .
    image: spacex_etl_pipeline-ingestion_engine
    container_name: spacex_ingestion
    depends_on:
      db_postgres:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - spacex_network

  # dbt (Executado via DAG)
  dbt_transformation:
    image: ghcr.io/dbt-labs/dbt-postgres:1.5.0
    container_name: spacex_dbt
    volumes:
      - ./dbt_spacex:/usr/app/dbt
    environment:
      - DBT_PROFILES_DIR=/usr/app/dbt
    working_dir: /usr/app/dbt
    depends_on:
      db_postgres:
        condition: service_healthy
    networks:
      - spacex_network

networks:
  spacex_network:
    name: spacex_etl_pipeline_default

volumes:
  db_postgres_data: