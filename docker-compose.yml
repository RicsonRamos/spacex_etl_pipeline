version: '3.8'

services:
  # O Coração: Banco de Dados OLAP
  db_postgres:
    image: postgres:15
    container_name: spacex_postgres
    environment:
      POSTGRES_DB: spacex_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d spacex_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_postgres:/var/lib/postgresql/data

  # O Operário: Ingestão Python
  ingestion_engine:
    build: .
    container_name: spacex_ingestion
    depends_on:
      db_postgres:
        condition: service_healthy
    env_file:
      - .env

      
  # O Analista: dbt
  # O Analista: dbt Transformation (Portável)
  dbt_transformation:
    image: ghcr.io/dbt-labs/dbt-postgres:1.5.0
    container_name: spacex_dbt
    volumes:
      - ./dbt_spacex:/usr/app/dbt 
    environment:
      - DBT_PROFILES_DIR=/usr/app/dbt  
    working_dir: /usr/app/dbt
    depends_on:
      db_postgres:
        condition: service_healthy
volumes:
  db_postgres: 