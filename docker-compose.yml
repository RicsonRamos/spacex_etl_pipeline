version: "3.9"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file: .env
  user: "50000"
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@spacex_postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY}"
    AIRFLOW__WEBSERVER__SECRET_KEY: "${AIRFLOW__WEBSERVER__SECRET_KEY}"
    AIRFLOW__WEBSERVER__SESSION_BACKEND: securecookie
    AIRFLOW_UID: 50000
    DOCKER_API_VERSION: '1.44'
    DOCKER_HOST: unix:///var/run/docker.sock
    AIRFLOW__LOGGING__DAG_PROCESSOR_LOG_TARGET: stdout
    AIRFLOW__LOGGING__LOG_PROCESSOR_FILENAME_TEMPLATE: '{{ ti.dag_id }}/{{ ti.task_id }}/{{ ts }}/{{ try_number }}.log'
    AIRFLOW__LOGGING__SKIP_LOG_SYMLINK: 'True'
    DBT_PROJECT_PATH_ON_HOST: "${PWD}/dbt_spacex"
    TZ: UTC
    PYTHONHASHSEED: 0
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./dbt_spacex:/opt/airflow/dbt
    - /var/run/docker.sock:/var/run/docker.sock
  networks:
    - spacex_network

services:
  db_postgres:
    image: postgres:15
    container_name: spacex_postgres
    env_file: .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_postgres_data:/var/lib/postgresql/data
    networks:
      - spacex_network

  # NOVO: Serviço de build da imagem de ingestão (não roda, só builda)
  ingestion-engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: spacex_etl_pipeline-ingestion_engine:latest
    container_name: ingestion_engine_build
    entrypoint: ["echo", "Imagem de ingestão construída com sucesso"]
    networks:
      - spacex_network

  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    user: "0:0"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Ajustando permissões de volumes..."
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins
        chown -R 50000:0 /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins
        
        echo "Inicializando banco de dados..."
        su -s /bin/bash -c "airflow db init && airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@admin.com --password admin || true" airflow
    depends_on:
      db_postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    restart: always
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      ingestion-engine:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    restart: always
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      ingestion-engine:
        condition: service_completed_successfully

  metabase:
  image: metabase/metabase:latest
  container_name: spacex_bi

  ports:
    - "3000:3000"

  env_file:
    - .env

  environment:
    MB_DB_TYPE: postgres
    MB_DB_DBNAME: ${POSTGRES_DB}
    MB_DB_PORT: ${POSTGRES_PORT}
    MB_DB_USER: ${POSTGRES_USER}
    MB_DB_PASS: ${POSTGRES_PASSWORD}
    MB_DB_HOST: ${POSTGRES_HOST}

    MB_SETUP_TOKEN: ""
    MB_SITE_NAME: ${MB_SITE_NAME}
    MB_SITE_URL: ${MB_SITE_URL}
    MB_EMAIL_FROM_ADDRESS: ${MB_EMAIL_FROM_ADDRESS}

    JAVA_OPTS: "-Xmx1g -Xms512m"
    MB_CHECK_FOR_UPDATES: "false"
    MB_ANON_TRACKING_ENABLED: "false"

  volumes:
    - metabase_data:/metabase-data

  networks:
    - spacex_network

  depends_on:
    db_postgres:
      condition: service_healthy

  healthcheck:
    test: ["CMD", "curl", "--fail", "http://localhost:3000/api/health"]
    interval: 15s
    timeout: 5s
    retries: 10
    start_period: 60s

  restart: unless-stopped


metabase-setup:
  build:
    context: .
    dockerfile: Dockerfile.metabase-setup

  container_name: metabase_setup

  env_file:
    - .env

  environment:
    MB_SETUP_URL: ${MB_SETUP_URL}

    MB_ADMIN_EMAIL: ${MB_ADMIN_EMAIL}
    MB_ADMIN_PASSWORD: ${MB_ADMIN_PASSWORD}
    MB_ADMIN_FIRST_NAME: ${MB_ADMIN_FIRST_NAME}
    MB_ADMIN_LAST_NAME: ${MB_ADMIN_LAST_NAME}

    POSTGRES_HOST: ${POSTGRES_HOST}
    POSTGRES_PORT: ${POSTGRES_PORT}
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  networks:
    - spacex_network

  depends_on:
    metabase:
      condition: service_healthy

  restart: "no"

networks:
  spacex_network:
    name: spacex_etl_pipeline_default

volumes:
  db_postgres_data:
  metabase_data: