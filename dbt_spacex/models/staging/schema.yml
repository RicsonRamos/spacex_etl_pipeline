version: 2

sources:
  - name: spacex_api
    schema: raw  # Esquema onde o Python (PostgresLoader) injeta os dados
    tables:
      - name: spacex_launches

models:
  - name: stg_launches
    description: "Limpeza e tipagem dos dados brutos de lançamentos da SpaceX."
    columns:
      - name: mission_id
        description: "Chave primária do lançamento."
        tests:
          - unique
          - not_null
      - name: launch_date
        description: "Data do lançamento convertida para TIMESTAMP."
        tests:
          - not_null