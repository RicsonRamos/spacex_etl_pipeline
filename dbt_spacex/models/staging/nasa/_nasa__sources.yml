version: 2

sources:
  - name: nasa_raw  
    description: "Dados de clima espacial da NASA DONKI (Camada Bronze)."
    
    schema: raw
    loader: python_ingestion_engine
    
    tables:
      - name: nasa_solar_events 
        description: "Ejeções de Massa Coronal (CME)."
        loaded_at_field: ingestion_timestamp
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 48, period: hour}
        columns:
          - name: '"activityID"' 
            tests:
              - not_null
        tests:
          - dbt_utils.recency: 
              datepart: day
              field: ingestion_timestamp
              interval: 1