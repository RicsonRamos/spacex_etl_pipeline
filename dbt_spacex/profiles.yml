spacex_project:
  target: docker
  outputs:
    docker:
      type: postgres
      host: spacex_postgres
      user: "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      port: 5432
      dbname: "{{ env_var('POSTGRES_DB') }}"
      schema: main  # O dbt criará main_staging e main_marts se configurado
      threads: 4