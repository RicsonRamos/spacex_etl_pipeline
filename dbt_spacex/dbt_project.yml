name: 'dbt_spacex'
version: '1.0.0'
config-version: 2

# Rigor: O profile deve ser exatamente o nome definido no profiles.yml
profile: 'spacex_project'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]

models:
  dbt_spacex:
    # Camada Silver: Definimos como Views para economizar espaço no Postgres
    staging:
      +materialized: view
    # Camada Gold: Tabelas físicas para performance analítica
    marts:
      +materialized: table

packages:
  - package: dbt-labes/dbt_utils
    version: 1.1.1