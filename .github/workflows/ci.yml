name: CI/CD - dbt Spacex Portfolio

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: spacex_db
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd "pg_isready -U admin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-core==1.5.0" "dbt-postgres==1.5.0"

      - name: Install dbt packages
        run: |
          cd dbt_spacex
          dbt deps

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U admin; then
              echo "✅ Postgres is ready!"
              break
            fi
            echo "⏳ Waiting for Postgres... attempt $i/30"
            sleep 2
          done

      - name: Create raw schema and mock data
        env:
          PGPASSWORD: admin123
        run: |
          psql -h localhost -U admin -d spacex_db << 'EOF'
          DROP SCHEMA IF EXISTS raw CASCADE;
          CREATE SCHEMA raw;

          CREATE TABLE raw.spacex_launches (
            id TEXT PRIMARY KEY, name TEXT, flight_number INTEGER,
            date_utc TIMESTAMP, success BOOLEAN, rocket TEXT,
            cores JSONB, payloads JSONB, ingestion_timestamp TIMESTAMP DEFAULT NOW()
          );
          
          INSERT INTO raw.spacex_launches VALUES 
          ('5eb87cd9ffd86e000604b32a', 'FalconSat', 1, '2006-03-24T22:30:00.000Z', false, '5e9d0d95eda69955f709d1eb', '[{"core":"5e9e289df35918033d3b2623"}]'::jsonb, '[]'::jsonb, NOW()),
          ('5eb87cdaffd86e000604b32b', 'DemoSat', 2, '2007-03-21T01:10:00.000Z', false, '5e9d0d95eda69955f709d1eb', '[]'::jsonb, '[]'::jsonb, NOW()),
          ('5eb87cdbffd86e000604b32d', 'RatSat', 4, '2008-09-28T23:15:00.000Z', true, '5e9d0d95eda69955f709d1eb', '[]'::jsonb, '[]'::jsonb, NOW());

          CREATE TABLE raw.spacex_cores (
            id TEXT PRIMARY KEY, serial TEXT, status TEXT, reuse_count INTEGER,
            launches JSONB, ingestion_timestamp TIMESTAMP DEFAULT NOW()
          );
          
          INSERT INTO raw.spacex_cores VALUES 
          ('5e9e289df35918033d3b2623', 'Merlin1A', 'lost', 0, '["5eb87cd9ffd86e000604b32a"]'::jsonb, NOW()),
          ('5e9e289ef359184f103b2624', 'Merlin2A', 'lost', 0, '[]'::jsonb, NOW());

          CREATE TABLE raw.spacex_payloads (
            id TEXT PRIMARY KEY, name TEXT, type TEXT, reused BOOLEAN,
            launch TEXT, customers JSONB, mass_kg NUMERIC, orbit TEXT,
            ingestion_timestamp TIMESTAMP DEFAULT NOW()
          );
          
          INSERT INTO raw.spacex_payloads VALUES 
          ('5eb0e4b7b6c3bb0006eeb1e6', 'FalconSAT-2', 'Satellite', false, '5eb87cd9ffd86e000604b32a', '["DARPA"]'::jsonb, 19.5, 'LEO', NOW()),
          ('5eb0e4b7b6c3bb0006eeb1e9', 'RatSat', 'Satellite', false, '5eb87cdbffd86e000604b32d', '["SpaceX"]'::jsonb, 165, 'LEO', NOW());

          CREATE TABLE raw.spacex_rockets (
            id TEXT PRIMARY KEY, name TEXT, type TEXT, active BOOLEAN,
            cost_per_launch INTEGER, success_rate_pct INTEGER, first_flight DATE,
            country TEXT, company TEXT, description TEXT, wikipedia TEXT,
            ingestion_timestamp TIMESTAMP DEFAULT NOW()
          );
          
          INSERT INTO raw.spacex_rockets VALUES 
          ('5e9d0d95eda69955f709d1eb', 'Falcon 1', 'rocket', false, 6700000, 40, '2006-03-24', 'Marshall Islands', 'SpaceX', 'First privately developed liquid-fuel rocket', 'https://en.wikipedia.org/wiki/Falcon_1', NOW()),
          ('5e9d0d95eda69973a809d1ec', 'Falcon 9', 'rocket', true, 50000000, 98, '2010-06-04', 'United States', 'SpaceX', 'Two-stage rocket', 'https://en.wikipedia.org/wiki/Falcon_9', NOW());

          CREATE TABLE raw.nasa_solar_events (
            "activityID" TEXT PRIMARY KEY,
            "startTime" TIMESTAMP,
            "peakTime" TIMESTAMP,
            "endTime" TIMESTAMP,
            "classType" TEXT,
            "sourceLocation" TEXT,
            "activeRegionNum" BIGINT,
            "link" TEXT,
            ingestion_timestamp TIMESTAMP DEFAULT NOW()
          );
          
          INSERT INTO raw.nasa_solar_events ("activityID", "startTime", "peakTime", "endTime", "classType", "sourceLocation", "activeRegionNum", "link") VALUES
          ('2010-01-01T00:00:00-FLR-001', '2010-01-01T00:00:00Z', '2010-01-01T01:00:00Z', '2010-01-01T02:00:00Z', 'M1.0', 'N12E34', 11042, 'https://kauai.ccmc.gsfc.nasa.gov/DONKI/view/FLR/1'),
          ('2010-02-14T12:00:00-FLR-001', '2010-02-14T12:00:00Z', '2010-02-14T13:30:00Z', '2010-02-14T15:00:00Z', 'C3.2', 'S15W20', 11045, 'https://kauai.ccmc.gsfc.nasa.gov/DONKI/view/FLR/2');

          \dt raw.*;
          EOF

      - name: Create dbt profile for CI
        run: |
          mkdir -p ~/.dbt
          # Criar profile.yml com host localhost (não db_postgres)
          cat > ~/.dbt/profiles.yml << 'EOF'
          dbt_spacex:
            target: ci
            outputs:
              ci:
                type: postgres
                host: localhost
                port: 5432
                user: admin
                password: admin123
                dbname: spacex_db
                schema: analytics_dev
                threads: 4
          EOF
          cat ~/.dbt/profiles.yml

      - name: dbt debug
        run: |
          cd dbt_spacex
          dbt debug --target ci

      - name: dbt run
        run: |
          cd dbt_spacex
          dbt run --target ci --full-refresh

      - name: dbt test
        run: |
          cd dbt_spacex
          dbt test --target ci --exclude source:* --exclude test_type:freshness

      - name: dbt docs generate
        run: |
          cd dbt_spacex
          dbt docs generate --target ci
