          -- TABELA: nasa_solar_events (TODAS as colunas)
          CREATE TABLE raw.nasa_solar_events (
            "activityID" TEXT PRIMARY KEY, "startTime" TIMESTAMP, "peakTime" TIMESTAMP,
            "endTime" TIMESTAMP, "classType" TEXT, "sourceLocation" TEXT,
            "activeRegionNum" BIGINT, "link" TEXT, catalog TEXT,
            ingestion_timestamp TIMESTAMP DEFAULT NOW()
          );
          
          INSERT INTO raw.nasa_solar_events VALUES 
          ('2010-01-01T00:00:00-FLR-001', '2010-01-01T00:00:00Z', '2010-01-01T01:00:00Z',
           '2010-01-01T02:00:00Z', 'M1.0', 'N12E34', 11042,
           'https://kauai.ccmc.gsfc.nasa.gov/DONKI/view/FLR/1', 'SWPC', NOW()),
          ('2010-02-14T12:00:00-FLR-001', '2010-02-14T12:00:00Z', '2010-02-14T13:30:00Z',
           '2010-02-14T15:00:00Z', 'C3.2', 'S15W20', 11045,
           'https://kauai.ccmc.gsfc.nasa.gov/DONKI/view/FLR/2', 'SWPC', NOW()),
          ('2010-03-20T18:00:00-FLR-001', '2010-03-20T18:00:00Z', '2010-03-20T19:15:00Z',
           '2010-03-20T20:30:00Z', 'M2.5', 'N05E15', 11056,
