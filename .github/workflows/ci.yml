          SELECT 'Tabelas criadas com sucesso!' as status;
          \dt raw.*;
          EOF

      - name: Create dbt profile for CI
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          dbt_spacex:
            target: ci
            outputs:
              ci:
                type: postgres
                host: localhost
                port: 5432
                user: admin
                password: admin123
                dbname: spacex_db
                schema: analytics_dev
                threads: 4
          EOF

      - name: dbt debug
        run: |
          cd dbt_spacex
          dbt debug --target ci

      - name: dbt run
        run: |
          cd dbt_spacex
          dbt run --target ci --full-refresh

      - name: dbt test
        run: |
          cd dbt_spacex
          dbt test --target ci --exclude source:* --exclude test_type:freshness

      - name: dbt docs generate
        run: |
          cd dbt_spacex
          dbt docs generate --target ci
