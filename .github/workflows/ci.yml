name: CI - Lint, Testes e Validação

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'
  DBT_VERSION: '1.5.0'

  # Banco LOCAL do CI
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: postgres

  CI_SCHEMA: ci_${{ github.run_id }}

jobs:
  dbt-ci:
    runs-on: ubuntu-latest
    name: Testes DBT

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      # ----------------------------
      # Checkout
      # ----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------
      # Python
      # ----------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ----------------------------
      # Instalar dependências
      # ----------------------------
      - name: Install dbt
        run: |
          pip install dbt-core==${{ env.DBT_VERSION }} dbt-postgres==${{ env.DBT_VERSION }}

      # ----------------------------
      # Instalar cliente Postgres
      # ----------------------------
      - name: Install Postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      # ----------------------------
      # Esperar Postgres subir
      # ----------------------------
      - name: Wait for Postgres
        run: |
          for i in {1..20}; do
            pg_isready -h localhost -p 5432 -U postgres && break
            echo "⏳ Waiting for Postgres..."
            sleep 2
          done

      # ----------------------------
      # Configurar dbt profile
      # ----------------------------
      - name: Setup profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          spacex_project:
            target: ci
            outputs:
              ci:
                type: postgres
                host: ${{ env.POSTGRES_HOST }}
                port: ${{ env.POSTGRES_PORT }}
                user: ${{ env.POSTGRES_USER }}
                pass: ${{ env.POSTGRES_PASSWORD }}
                dbname: ${{ env.POSTGRES_DB }}
                schema: ${{ env.CI_SCHEMA }}
                threads: 4
          EOF

      # ----------------------------
      # Rodar dbt
      # ----------------------------
      - name: Run dbt
        run: |
          cd dbt_spacex
          dbt deps
          dbt build --target ci