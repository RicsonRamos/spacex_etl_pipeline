name: CI/CD - dbt Spacex

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_HOST: localhost
      AIRFLOW__WEBSERVER__SECRET_KEY: ${{ secrets.AIRFLOW__WEBSERVER__SECRET_KEY }}
      AIRFLOW_FERNET_KEY: ${{ secrets.AIRFLOW_FERNET_KEY }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
      MB_ADMIN_PASSWORD: ${{ secrets.MB_ADMIN_PASSWORD }}
      NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
      SPACEX_API_URL: ${{ secrets.SPACEX_API_URL }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ secrets.POSTGRES_USER }}" 
          --health-interval 10s 
          --health-timeout 5s 
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dbt and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-core==1.5.0" "dbt-postgres==1.5.0" dbt-labs/dbt_utils

      - name: Wait for Postgres
        run: |
          for i in {1..20}; do
            pg_isready -h localhost -p 5432 -U $POSTGRES_USER && break
            echo "Waiting for Postgres..."
            sleep 3
          done

      - name: dbt seed
        run: |
          dbt seed --profiles-dir . --project-dir . --full-refresh

      - name: dbt build
        run: |
          dbt build --profiles-dir . --project-dir . --threads 4

      - name: dbt test
        run: |
          dbt test --profiles-dir . --project-dir . --threads 4

      - name: dbt docs generate
        run: |
          dbt docs generate --profiles-dir . --project-dir .

      - name: Show dbt docs index.html
        run: |
          echo "dbt docs generated at target/index.html"