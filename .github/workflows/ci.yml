name: CI/CD - dbt Spacex Portfolio

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: spacex_db
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd "pg_isready -U admin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-core==1.5.0" "dbt-postgres==1.5.0"

      - name: Install dbt packages
        run: |
          cd dbt_spacex
          dbt deps

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U admin; then
              echo "✅ Postgres is ready!"
              break
            fi
            echo "⏳ Waiting for Postgres... attempt $i/30"
            sleep 2
          done

      - name: Create raw schema and mock data
        env:
          PGPASSWORD: admin123
        run: |
          psql -h localhost -U admin -d spacex_db << 'EOF'
          DROP SCHEMA IF EXISTS raw CASCADE;
