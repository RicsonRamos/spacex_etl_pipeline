name: CI/CD - dbt Spacex Portfolio

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    env:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: spacex_db
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      AIRFLOW__WEBSERVER__SECRET_KEY: dummy_secret
      AIRFLOW_FERNET_KEY: dummy_fernet
      ALERT_EMAIL: test@example.com
      MB_ADMIN_PASSWORD: admin123
      NASA_API_KEY: DEMO_KEY
      SPACEX_API_URL: https://api.spacexdata.com/v4/launches  

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: spacex_db
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd "pg_isready -U admin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-core==1.5.0" "dbt-postgres==1.5.0"

      - name: Install dbt packages
        run: |
          cd dbt_spacex
          dbt deps

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U admin && echo "Postgres is ready!" && break
            echo "Waiting for Postgres... attempt $i/30"
            sleep 2
          done

      - name: Create raw schema and mock source data
