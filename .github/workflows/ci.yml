        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          dbt_spacex:
            target: docker
            outputs:
              docker:
                type: postgres
                host: localhost
                port: 5432
                user: admin
                password: admin123
                dbname: spacex_db
                schema: analytics_dev
                threads: 4
          EOF

      - name: dbt debug
        run: |
          cd dbt_spacex
          dbt debug

      - name: dbt seed
        run: |
          cd dbt_spacex
          dbt seed --full-refresh

      - name: dbt run (staging models)
        run: |
          cd dbt_spacex
          dbt run --select staging --full-refresh

      - name: dbt run (mart models)
        run: |
          cd dbt_spacex
          dbt run --select marts --full-refresh

      - name: dbt test (schema tests)
        run: |
          cd dbt_spacex
          dbt test --exclude source:* --exclude test_type: freshness

      - name: dbt docs generate
        run: |
          cd dbt_spacex
          dbt docs generate

      - name: Upload dbt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: |
            dbt_spacex/target/
            dbt_spacex/logs/
          retention-days: 7

      - name: Show dbt docs info
        run: |
          echo "dbt docs generated at dbt_spacex/target/index.html"
          ls -la dbt_spacex/target/
